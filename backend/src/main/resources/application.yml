server:
  port: 8080

spring:
  application:
    name: seckill-service
  
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
  
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seckill?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
